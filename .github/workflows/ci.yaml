name: Payment Service CI/CD

on:
  push:
    branches:
      - tasks/PMT-0
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI - Build, Test & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & run tests
        env:
            SPRING_PROFILES_ACTIVE: test
            TESTCONTAINERS_RYUK_DISABLED: false
        run: |
            sudo chmod 666 /var/run/docker.sock
            ./mvnw clean verify
      - name: Build, Test and Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRING_PROFILES_ACTIVE: test
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.organization=daryamashniuk \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=DaryaMashniuk_ShopProject_PaymentService

  cd:
    name: CD - Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/tasks/PMT-0'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paymentservice:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/paymentservice:latest