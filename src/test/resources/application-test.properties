spring.liquibase.enabled=false
logging.level.org.springframework=DEBUG
logging.level.com.innowise=DEBUG
spring.test.context.failure.threshold=100

random-org.num= 1
random-org.min= 1
random-org.max= 1000
random-org.col= 1
random-org.base= 10
random-org.format= plain
random-org.rnd=new

random-org.url=http://localhost:1

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.payment.topic.name=${KAFKA_PAYMENT_EVENTS_TOPIC}
kafka.order.topic.name=${KAFKA_ORDER_EVENTS_TOPIC}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.innowise.paymentservice.model.events.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.group-id=1
spring.kafka.consumer.properties.spring.json.trusted.packages=com.innowise.paymentservice.model.events


spring.application.name=paymentservice
server.port=8084

spring.liquibase.change-log=db/changelog/db.changelog-master.yaml
spring.liquibase.driver-class-name=liquibase.ext.mongodb.database.MongoClientDriver

